<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LM Voice — Claude.ai bridge</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0f1219; color: #e7e9ee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    body { user-select: none; -webkit-user-select: none; }
    #tab-bar { display: flex; align-items: stretch; height: 36px; background: #14171f; border-bottom: 1px solid #2a2f3b; -webkit-app-region: drag; }
    .brand { padding: 0 14px; display: flex; align-items: center; font-size: 11px; color: #6b7384; text-transform: uppercase; letter-spacing: 0.5px; }
    .tabs { display: flex; flex: 1 1 auto; -webkit-app-region: no-drag; }
    .tab { padding: 0 18px; display: flex; align-items: center; cursor: pointer; border-right: 1px solid #1d212c; font-size: 12.5px; color: #aab1bd; }
    .tab:hover { background: #1d212c; color: #d8e1ff; }
    .tab.active { background: #2a2f3b; color: #ffffff; }
    .tab .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #555; margin-right: 8px; }
    .tab .dot.ok { background: #5ac46a; }
    .tab .dot.warn { background: #e0a23a; }
    .tab .dot.err { background: #e15050; }
    .right { display: flex; align-items: center; padding: 0 12px; gap: 12px; -webkit-app-region: no-drag; font-size: 11px; color: #6b7384; }
    .right .pill { background: #1d212c; padding: 3px 8px; border-radius: 999px; color: #aab1bd; }
    .right .pill.ok { background: #1d3826; color: #b6f0c9; }
    .right .pill.warn { background: #3a2e1a; color: #e0a23a; }
  </style>
</head>
<body>
  <div id="tab-bar">
    <div class="brand">LM Voice</div>
    <div class="tabs">
      <div class="tab active" data-tab="claude-ai"><span class="dot ok" id="dot-tab-claude-ai"></span>Claude.ai</div>
      <div class="tab" data-tab="conversation"><span class="dot" id="dot-tab-conv"></span>Conversation</div>
    </div>
    <div class="right">
      <span class="pill" id="pill-page">page: …</span>
      <span class="pill" id="pill-up">upstream: …</span>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach((el) => {
      el.addEventListener('click', () => {
        tabs.forEach((t) => t.classList.remove('active'));
        el.classList.add('active');
        ipcRenderer.send('claude-ai-browser:switch-tab', el.dataset.tab);
      });
    });
    ipcRenderer.on('claude-ai-browser:tab-state', (_, payload) => {
      tabs.forEach((t) => t.classList.toggle('active', t.dataset.tab === payload.active));
    });
    ipcRenderer.on('claude-ai-browser:bridge-state', (_, s) => {
      const pageOk = !!s?.pageAttached;
      document.getElementById('pill-page').textContent = pageOk ? 'page: attached' : 'page: detached';
      document.getElementById('pill-page').className = 'pill ' + (pageOk ? 'ok' : 'warn');
      const upOk = !!s?.upstreamOpen;
      document.getElementById('pill-up').textContent = upOk ? 'voice: live' : 'voice: idle';
      document.getElementById('pill-up').className = 'pill ' + (upOk ? 'ok' : '');
      document.getElementById('dot-tab-conv').className = 'dot ' + (upOk ? 'ok' : (pageOk ? 'warn' : ''));
    });
    ipcRenderer.send('claude-ai-browser:ready');
  </script>
</body>
</html>
