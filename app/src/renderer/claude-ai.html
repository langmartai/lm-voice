<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob: data:; connect-src ws://127.0.0.1:* http://127.0.0.1:*" />
  <title>Conversation</title>
  <link rel="stylesheet" href="claude-ai.css" />
</head>
<body>
  <div id="root">
    <div id="status-bar">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Connecting…</span>
      <span id="status-detail"></span>
      <span class="spacer"></span>
      <button id="btn-new" class="action primary" title="Create a fresh conversation and open voice mode">▶ New session</button>
      <button id="btn-switch" class="action" title="Switch to an existing conversation">↺ Switch…</button>
      <button id="btn-stop" class="action danger" title="Close the voice session" disabled>■ Stop</button>
      <span class="kbd-hint" title="Space: start session / pause TTS · Enter: cancel TTS · Esc: stop session">⎵ start/pause · ⏎ skip · ⎋ stop</span>
      <button id="toggle-debug" title="Show raw event stream">debug</button>
    </div>

    <div id="picker" class="hidden">
      <div class="picker-head">
        <span>Switch to conversation</span>
        <button id="picker-close" title="Close">×</button>
      </div>
      <div id="picker-body" class="picker-body"><div class="picker-loading">loading…</div></div>
    </div>

    <div id="log" aria-live="polite"></div>

    <div id="composer">
      <input id="composer-input" type="text" placeholder="Type to inject text into the voice conversation… (Enter to send)" autocomplete="off" spellcheck="false" />
      <button id="composer-send" title="Send text (Enter)">↑</button>
    </div>

    <div id="debug-panel" class="hidden">
      <div class="debug-head">raw server events <button id="clear-events">clear</button></div>
      <pre id="events"></pre>
    </div>
  </div>
  <script src="claude-ai.js"></script>
</body>
</html>
